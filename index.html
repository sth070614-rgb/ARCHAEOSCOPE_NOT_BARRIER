<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>모두의 궁·도성·북촌 지도</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <h1>모두의 궁·도성·북촌 지도</h1>
    <p>경복궁·한양도성·북촌 배리어프리 문화유산 웹지도</p>
  </header>

  <main>
    <section class="filters">
      <button>전체</button>
      <button>경복궁</button>
      <button>북촌</button>
      <button>도성</button>
      <button>화장실</button>
      <button>휴식</button>
      <button>주의구간</button>
    </section>

    <section id="map">
      지도 영역입니다. 이후 Google Maps가 들어갑니다.
    </section>

    <section id="info-card" class="info-card">
      <h2>장소 또는 구간을 선택하세요</h2>
      <p>선택한 장소의 배리어프리 정보가 여기에 표시됩니다.</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>

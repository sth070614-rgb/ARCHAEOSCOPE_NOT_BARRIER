<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Archaeoscope Barrier-Free Heritage Map</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div>
        <p class="eyebrow">ARCHAEOSCOPE NOT BARRIER</p>
        <h1>경복궁 · 한양도성 · 북촌 배리어프리 문화유산 웹지도</h1>
      </div>
    </header>

    <main class="map-layout">
      <section class="map-panel" aria-label="문화유산 위치 지도">
        <div id="map" class="map-canvas" role="application" aria-label="Google 지도"></div>
        <div class="map-legend" aria-label="지도 범례">
          <div class="legend-group">
            <p class="legend-title">접근성 경로</p>
            <p><span class="legend-swatch legend-swatch--easy"></span>접근 용이</p>
            <p><span class="legend-swatch legend-swatch--moderate"></span>보통</p>
            <p><span class="legend-swatch legend-swatch--difficult"></span>주의 필요</p>
          </div>
          <div class="legend-group">
            <p class="legend-title">마커 분류</p>
            <p><span class="legend-code">문</span>문화유산</p>
            <p><span class="legend-code">식</span>음식점</p>
            <p><span class="legend-code">카</span>카페</p>
            <p><span class="legend-code">교</span>교통</p>
            <p><span class="legend-code">편</span>편의</p>
          </div>
        </div>
      </section>

      <aside id="info-card" class="info-card" aria-live="polite">
        <p class="info-kicker">장소를 선택하세요</p>
        <h2>지도 마커를 클릭하면 상세 정보가 표시됩니다.</h2>
        <p class="info-summary">
          경복궁, 한양도성, 북촌 일대의 문화유산 접근성 정보를 확인할 수 있습니다.
        </p>
      </aside>
    </main>

    <script src="./app.js"></script>
    <script
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBeNRiv1cf-27mFk_QNXTj2Q3uAfWo0ygo&callback=initMap&loading=async"
      async
      defer
    ></script>
  </body>
</html>
